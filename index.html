<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weapon Skins Drop</title>
<style>
  /* ── Constants (mirrored in JS) ───────────────────────────── */
  :root {
    --accent: #e8a020;
    --accent2: #ff5f40;
    --bg: #0d0f14;
    --card-bg: #171a22;
    --card-border: #2a2d3a;
    --text: #e0e4f0;
    --muted: #6b7280;
    --taken: #22c55e;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────────────── */
  header {
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--card-border);
    flex-shrink: 0;
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
  #inv-badge {
    background: var(--card-border);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: .75rem;
    font-weight: 600;
    color: var(--muted);
    transition: color .3s;
  }
  #inv-badge.has-items { color: var(--taken); }

  /* ── Main stage: fills remaining space, centers skins row ── */
  #main-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a1e2d 0%, var(--bg) 70%);
  }
  /* ── Skins strip – horizontal scrolling row ─────────────── */
  #skins-grid {
    display: flex;
    flex-direction: row;
    gap: 12px;
    padding: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #skins-grid::-webkit-scrollbar { display: none; }

  .skin-card {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    transition: border-color .3s, box-shadow .3s;
    flex: 0 0 150px; /* fixed width, no shrink/grow */
    width: 150px;
  }
  /* Glow on the active (currently colorizing) skin */
  .skin-card.active {
    border-color: var(--accent2);
    box-shadow: 0 0 12px 2px rgba(255,95,64,.35);
  }
  .skin-card.ready { border-color: var(--accent); }
  .skin-card.taken { border-color: var(--taken); }

  /* Placeholder weapon art */
  .skin-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.6rem;
    /* CSS filter drives grayscale→color transition */
    transition: filter .4s;
  }

  .skin-info {
    padding: 8px 10px 10px;
  }
  .skin-weapon { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--accent); }
  .skin-name   { font-size: .72rem; color: var(--muted); margin-top: 2px; }

  /* Progress bar */
  .skin-progress {
    height: 3px;
    background: #222533;
    margin: 6px 0 0;
    border-radius: 999px;
    overflow: hidden;
  }
  .skin-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 999px;
    width: 0%;
    transition: width .5s linear;
  }

  /* TAKEN badge */
  .taken-badge {
    position: absolute;
    top: 7px; right: 7px;
    background: var(--taken);
    color: #fff;
    font-size: .6rem;
    font-weight: 800;
    letter-spacing: .08em;
    padding: 3px 7px;
    border-radius: 999px;
    display: none;
  }
  .skin-card.taken .taken-badge { display: block; }

  /* ── Bottom area ─────────────────────────────────────────── */
  footer {
    padding: 16px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
    border-top: 1px solid var(--card-border);
    background: #10131a;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #status-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
  }

  .stat-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .stat-label { font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 2px; }
  .stat-value { font-size: 1.8rem; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text); line-height: 1; }
  #counter-val { font-size: 2.8rem; color: var(--accent); }

  #take-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #e8a020, #ff5f40);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    touch-action: manipulation;
  }
  #take-btn:active { opacity: .85; transform: scale(.98); }
  #take-btn:disabled { background: var(--card-border); color: var(--muted); cursor: default; transform: none; }

  #reset-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: .8rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .2s, color .2s, transform .1s;
    touch-action: manipulation;
  }
  #reset-btn:active { border-color: var(--accent2); color: var(--accent2); transform: scale(.98); }

  /* ── Inventory drawer ────────────────────────────────────── */
  #inv-drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    background: #13161f;
    border-top: 2px solid var(--card-border);
    border-radius: 20px 20px 0 0;
    padding: 16px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    z-index: 100;
    max-height: 55dvh;
    overflow-y: auto;
  }
  #inv-drawer.open { transform: translateY(0); }
  #inv-drawer h2 { font-size: .85rem; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 12px; }
  .inv-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--card-border);
    font-size: .82rem;
  }
  .inv-item .iname { font-weight: 600; }
  .inv-item .iskin { color: var(--muted); font-size: .73rem; }
  #inv-empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 20px 0; }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 99;
    display: none;
  }
  #overlay.show { display: block; }

  /* flash on reset */
  @keyframes flash-red {
    0%   { background: #3a0a0a; }
    100% { background: var(--bg); }
  }
  body.flash { animation: flash-red .4s ease-out; }
</style>
</head>
<body>

<header>
  <h1>🔫 Skin Drop</h1>
  <div id="inv-badge" onclick="toggleDrawer()">Inventory: <span id="inv-count">0</span></div>
</header>

<main id="main-stage">
  <div id="skins-grid">
    <!-- Cards injected by JS -->
  </div>
</main>

<footer>
  <div id="status-row">
    <div class="stat-box">
      <span class="stat-label">Timer</span>
      <span class="stat-value" id="counter-val">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Ready</span>
      <span class="stat-value" id="ready-count">0</span>
    </div>
  </div>
  <button id="take-btn" onclick="takeSkins()">TAKE</button>
  <button id="reset-btn" onclick="cheatReset()">&#8635; Reset (cheat)</button>
</footer>

<!-- Inventory drawer -->
<div id="overlay" onclick="toggleDrawer()"></div>
<div id="inv-drawer">
  <h2>Collected Skins</h2>
  <div id="inv-empty">Nothing collected yet.</div>
  <div id="inv-list"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   CONSTANTS  – tweak these freely
══════════════════════════════════════════════ */
const RESET_MIN_SEC      = 5;    // hidden reset: minimum seconds (not shown to user)
const RESET_MAX_SEC      = 300;  // hidden reset: maximum seconds (wide range: 5–300)
// EARLY_RESET_PROB removed – only scheduled reset remains, timing is hidden
const SKIN_DUR_MIN_SEC   = 6;   // min coloring duration per skin (seconds)
const SKIN_DUR_MAX_SEC   = 22;  // max coloring duration per skin (seconds)
const READY_THRESHOLD    = 1.0; // skin is collectable only when fully colored (progress == 1.0)
const TICK_MS            = 1000;// main tick interval

/* ══════════════════════════════════════════════
   SKIN DATA
══════════════════════════════════════════════ */
const SKIN_DATA = [
  { weapon: 'AK-47',   skin: 'Redline',        emoji: '🟥', bg: 'linear-gradient(135deg,#2d0a0a,#1a0e0e)' },
  { weapon: 'AWP',     skin: 'Dragon Lore',     emoji: '🐉', bg: 'linear-gradient(135deg,#1a1a0a,#2d2a0d)' },
  { weapon: 'M4A1-S',  skin: 'Hyper Beast',     emoji: '🦁', bg: 'linear-gradient(135deg,#0a1a2d,#0d1a2a)' },
  { weapon: 'Glock-18',skin: 'Fade',            emoji: '🌈', bg: 'linear-gradient(135deg,#1a0a2d,#0d0a1a)' },
  { weapon: 'Desert Eagle', skin: 'Blaze',      emoji: '🔥', bg: 'linear-gradient(135deg,#2d1a0a,#1a100d)' },
  { weapon: 'USP-S',   skin: 'Kill Confirmed',  emoji: '💀', bg: 'linear-gradient(135deg,#0a2d0a,#0d1a0d)' },
];

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let elapsedSeconds   = 0;              // visible timer (shown to user)
let resetAfterSeconds = pickResetDuration(); // hidden reset duration (NOT shown)
let skins            = [];             // array of skin state objects
let inventory        = [];             // collected items
let activeIndex      = 0;             // index of the one skin currently colorizing

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
/* Returns a random hidden reset duration (never shown to user) */
function pickResetDuration() { return randInt(RESET_MIN_SEC, RESET_MAX_SEC); }

/* Build a fresh skin state. startTime is assigned when the skin becomes active. */
function freshSkinState(index) {
  return {
    index,
    progress:  0,
    duration:  rand(SKIN_DUR_MIN_SEC, SKIN_DUR_MAX_SEC),
    startTime: null,
  };
}

/* Activate the skin at activeIndex: record startTime from current elapsedSeconds */
function activateCurrent() {
  if (activeIndex < skins.length) {
    skins[activeIndex].startTime = elapsedSeconds;
  }
}

/* ══════════════════════════════════════════════
   DOM BUILDING
══════════════════════════════════════════════ */
function buildCards() {
  const grid = document.getElementById('skins-grid');
  grid.innerHTML = '';
  SKIN_DATA.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'skin-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="skin-thumb" id="thumb-${i}" style="background:${d.bg}">${d.emoji}</div>
      <div class="skin-info">
        <div class="skin-weapon">${d.weapon}</div>
        <div class="skin-name">${d.skin}</div>
        <div class="skin-progress"><div class="skin-progress-fill" id="prog-${i}"></div></div>
      </div>
      <div class="taken-badge">TAKEN</div>
    `;
    grid.appendChild(card);
  });
}

/* ══════════════════════════════════════════════
   RENDER  –  sequential model
══════════════════════════════════════════════ */
function render() {
  let collectible = 0;

  skins.forEach((s, i) => {
    const card   = document.getElementById(`card-${i}`);
    const thumb  = document.getElementById(`thumb-${i}`);
    const progEl = document.getElementById(`prog-${i}`);

    // Progress by sequential position
    let p;
    if (i < activeIndex) {
      p = 1; // completed skins remain fully colored
    } else if (i === activeIndex) {
      p = s.startTime === null
        ? 0
        : Math.min(1, (elapsedSeconds - s.startTime) / s.duration);
    } else {
      p = 0; // not yet their turn
    }
    s.progress = p;

    const gray = 1 - p;
    const sat  = 0.2 + p * 0.8;
    const bri  = 0.6 + p * 0.4;
    thumb.style.filter = `grayscale(${gray}) saturate(${sat}) brightness(${bri})`;
    progEl.style.width  = `${(p * 100).toFixed(1)}%`;

    const isReady  = p >= READY_THRESHOLD;
    const isActive = i === activeIndex && !isReady;
    card.className = 'skin-card'
      + (isActive ? ' active' : '')
      + (isReady  ? ' ready'  : '');
    if (isReady) collectible++;
  });

  document.getElementById('counter-val').textContent = elapsedSeconds;
  document.getElementById('ready-count').textContent = collectible;
  // "next-reset-val" DOM element removed – reset time is hidden from user

  document.getElementById('take-btn').disabled = collectible === 0;
}

/* ══════════════════════════════════════════════
   RESET  –  restarts sequence, timer → 0, keeps taken skins
══════════════════════════════════════════════ */
function doReset() {
  document.body.classList.remove('flash');
  void document.body.offsetWidth;
  document.body.classList.add('flash');
  setTimeout(() => document.body.classList.remove('flash'), 400);

  elapsedSeconds    = 0;                   // visible timer -> 0
  resetAfterSeconds = pickResetDuration(); // new hidden random duration (not shown)

  // All skins revert to grayscale and restart sequence
  skins = SKIN_DATA.map((_, i) => freshSkinState(i));
  activeIndex = 0;
  activateCurrent();
  render();
}

/* ══════════════════════════════════════════════
   TAKE ACTION
   Step 1: collect fully-colored skins into inventory
   Step 2: restart cycle immediately (timer + sequence reset)
   Inventory persists across all resets
══════════════════════════════════════════════ */
function takeSkins() {
  let anyTaken = false;
  skins.forEach((s, i) => {
    if (s.progress >= READY_THRESHOLD) {
      const d = SKIN_DATA[i];
      inventory.push({ weapon: d.weapon, skin: d.skin, emoji: d.emoji });
      anyTaken = true;
    }
  });
  if (anyTaken) updateInventoryUI();
  // Restart cycle (inventory already updated above; doReset does not touch inventory)
  doReset();
}

/* ══════════════════════════════════════════════
   CHEAT RESET BUTTON  –  manual cycle restart, inventory persists
══════════════════════════════════════════════ */
function cheatReset() {
  doReset();
}

/* ══════════════════════════════════════════════
   INVENTORY UI
══════════════════════════════════════════════ */
function updateInventoryUI() {
  const count   = inventory.length;
  const badge   = document.getElementById('inv-badge');
  const countEl = document.getElementById('inv-count');
  const list    = document.getElementById('inv-list');
  const empty   = document.getElementById('inv-empty');

  countEl.textContent = count;
  badge.className = count > 0 ? 'has-items' : '';

  empty.style.display = count === 0 ? 'block' : 'none';
  list.innerHTML = inventory.map(item =>
    `<div class="inv-item">
      <span class="iname">${item.emoji} ${item.weapon}</span>
      <span class="iskin">${item.skin}</span>
    </div>`
  ).join('');
}

function toggleDrawer() {
  document.getElementById('inv-drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

/* ══════════════════════════════════════════════
   MAIN TICK
══════════════════════════════════════════════ */
function tick() {
  elapsedSeconds++;

  // Hidden reset check: triggers when elapsedSeconds reaches the hidden threshold
  if (elapsedSeconds >= resetAfterSeconds) {
    doReset();
    return;
  }

  // Advance activeIndex when the current skin finishes colorizing
  if (activeIndex < skins.length) {
    const active  = skins[activeIndex];
    const elapsed = active.startTime !== null ? elapsedSeconds - active.startTime : 0;
    if (elapsed >= active.duration) {
      active.progress = 1; // freeze at 100%
      activeIndex++;       // next skin's turn
      activateCurrent();   // start its clock
    }
  }

  render();
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
function init() {
  skins = SKIN_DATA.map((_, i) => freshSkinState(i));
  activeIndex = 0;
  buildCards();
  updateInventoryUI();
  activateCurrent(); // begin colorizing first skin at t=0
  render();
  setInterval(tick, TICK_MS);
}

init();
</script>
</body>
</html>
